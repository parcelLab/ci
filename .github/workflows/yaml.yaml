name: Reusable YAML
on:
  workflow_call:
    inputs:
      runner:
        required: false
        description: Runner type
        default: ubuntu-latest
        type: string
      timeoutMinutes:
        required: false
        description: Maximum minutes before the job is cancelled
        default: 40
        type: number
      additional_args:
        required: false
        description: List of yaml files to exclude
        type: string
jobs:
  yaml:
    runs-on: ${{ inputs.runner }}
    timeout-minutes: ${{ inputs.timeoutMinutes }}
    steps:
      - name: Checkout current git repository
        uses: actions/checkout@v6

      - name: Lint all YAML files
        uses: actionsx/prettier@v3
        if: ${{ inputs.additional_args == '' }}
        with:
          args: --check "**/*.{yaml,yml}"

      - name: Lint some YAML files
        uses: actionsx/prettier@v3
        if: ${{ inputs.additional_args != '' }}
        with:
          args: --check "**/*.{yaml,yml}" "${{ inputs.additional_args }}"
